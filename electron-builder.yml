appId: com.xnowpost.app
productName: XNOWPost
directories:
  output: release
files:
  - electron/**/*
  - dist/**/*
  - src/index.js
  - src/notifier.js
  - src/organizer.js
  - src/scheduler.js
  - src/engine/**/*
  - src/platforms/**/*
  - src/collector/**/*
  - src/analyzer/**/*
  - assets/**/*
  - package.json
extraResources:
  - from: config
    to: app.asar.unpacked/config
asarUnpack:
  - "**/*.node"
  - "src/**"
  - "package.json"
  - "node_modules/**"
win:
  target: nsis
  # icon: assets/icon.ico（暂无自定义图标，使用 Electron 默认图标）
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
