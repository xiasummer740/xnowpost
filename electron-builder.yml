appId: com.xnowpost.app
productName: XNOWPost
directories:
  output: release
files:
  - electron/**/*
  - dist/**/*
  - src/index.js
  - src/notifier.js
  - src/organizer.js
  - src/scheduler.js
  - src/db.js
  - src/engine/**/*
  - src/platforms/**/*
  - src/collector/**/*
  - src/analyzer/**/*
  - src/publisher/**/*
  - assets/**/*
  - package.json
extraResources:
  - from: config
    to: app.asar.unpacked/config
asarUnpack:
  - "**/*.node"
  - "src/**"
  - "package.json"
  - "node_modules/**"
win:
  target: nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  - provider: github
    owner: xiasummer740
    repo: xnowpost
